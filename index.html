    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Traverse Outdoor Activities</title>

    <style>
        :root {
            --red: #E53935;
            --dark-red: #B71C1C;
            --light: #F5F5F5;
        }
    </style>
</head>

<body class="bg-white text-gray-800">

    <!-- Header -->
    <header class="p-5 bg-[var(--red)] text-white shadow-md">
        <img src="assets/images/logo.png" class="w-200 h-10 mr-3" alt="Traverse Outdoor Logo">
        <h1 class="text-2xl font-bold">Traverse Outdoor</h1>
        <p class="opacity-90 text-sm">Team Building Activity Guide</p>
    </header>

        </h2>

        <a href="activities/lift-the-ball.html"
   class="block group">

              border border-white/30
              shadow-md
              transition duration-300 ease-out
              hover:shadow-xl hover:scale-[1.02] hover:bg-white/60">

    <!-- Image Box -->
    <div class="relative w-14 h-14 rounded-xl mr-3 overflow-hidden flex-shrink-0">

        <!-- Red base -->
        <div class="absolute inset-0 bg-[var(--red)]"></div>

             class="absolute inset-0 w-full h-full object-cover opacity-40

             alt="Activity Image">

        <div class="absolute inset-0 bg-white/10"></div>
    </div>

    <!-- Text -->
