<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Traverse Outdoor Activities</title>

    <style>
        :root {
            --red: #E53935;
            --dark-red: #B71C1C;
            --light: #F5F5F5;
        }
    </style>
</head>

<body class="bg-white text-gray-800">

    <!-- Header -->
    <header class="p-5 bg-[var(--red)] text-white shadow-md">
        <img src="assets/images/logo.png" class="w-200 h-10 mr-3" alt="Traverse Outdoor Logo">
        <h1 class="text-2xl font-bold">Traverse Outdoor</h1>
        <p class="opacity-90 text-sm">Team Building Activity Guide</p>
    </header>

    <!-- Main -->
    <main class="p-4 space-y-4">

        <h2 class="text-lg font-semibold text-[var(--dark-red)]">
            Activities
        </h2>

        <!-- Activity Card -->
        <a href="activities/lift-the-ball.html"
           class="block bg-[var(--light)] p-4 rounded-2xl shadow hover:bg-gray-200 transition">
            <div class="flex items-center">
                <div class="w-14 h-14 bg-[var(--red)] rounded-xl mr-3"></div>
                <div>
                    <h3 class="text-lg font-semibold">Lift The Ball</h3>
                    <p class="text-xs text-gray-600">Coordination · Teamwork</p>
                </div>
            </div>
        </a>

        <a href="activities/human-knot.html"
           class="block bg-[var(--light)] p-4 rounded-2xl shadow hover:bg-gray-200 transition">
            <div class="flex items-center">
                <div class="w-14 h-14 bg-[var(--red)] rounded-xl mr-3"></div>
                <div>
                    <h3 class="text-lg font-semibold">Human Knot</h3>
                    <p class="text-xs text-gray-600">Unity · Cooperation</p>
                </div>
            </div>
        </a>

        <a href="activities/river-crossing.html"
           class="block bg-[var(--light)] p-4 rounded-2xl shadow hover:bg-gray-200 transition">
            <div class="flex items-center">
                <div class="w-14 h-14 bg-[var(--red)] rounded-xl mr-3"></div>
                <div>
                    <h3 class="text-lg font-semibold">River Crossing</h3>
                    <p class="text-xs text-gray-600">Strategy · Planning</p>
                </div>
            </div>
        </a>

    </main>

</body>
</html>
